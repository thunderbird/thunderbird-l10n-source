basepath = ".."
paths = [
    { reference = "calendar/**", l10n = "{l}calendar/**" },
]

[env]
l = "{l10n_base}/{locale}/"

[[filters]]
path = "{l}calendar/chrome/calendar/timezones.properties"
key = "re:."
action = "warning"

[[filters]]
path = "{l}calendar/chrome/calendar/calendar-extract.properties"
key = "re:.*from\\.today.*"
action = "warning"
